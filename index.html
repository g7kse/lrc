<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derwentwater Weather</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12437b" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/highcharts@11.1.0/highcharts.js"></script>

    <style>
        :root {
            --navy:      #12437b;
            --navy-dark: #12437bff;
            --navy-mid:  #1a5298;
            --accent:    #4a9fd4;
            --card-bg:   #ffffff;
            --border:    #d0dce8;
            --text-muted:#6c8aa8;
        }

        body {
            background: #aacbd2ff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #1a2a3a;
        }

        header {
            background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 60%, var(--navy-mid) 100%);
            border-bottom: 3px solid var(--accent);
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
        }

        header h1 {
            font-size: 1.4rem;
            letter-spacing: 0.03em;
            font-weight: 600;
        }

        #current-card {
            border: 1px solid var(--border);
            border-top: 4px solid var(--navy);
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(18,67,123,0.10);
            background: var(--card-bg);
        }

        #current-card .card-title {
            color: var(--navy);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 2px solid var(--border);
            padding-bottom: .5rem;
            margin-bottom: 1rem;
        }

        #wind-dir-display { line-height: 1; color: var(--navy); font-size: 2rem !important; }
        #wind-dir-label   { color: var(--text-muted); font-size: .75rem; font-weight: 600; }

        .badge { font-size: .8rem; padding: .35em .7em; border-radius: 6px; font-weight: 600; }

        #meteogram-wrap {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 0.5rem 0.25rem 0.25rem;
            height: 280px;
        }

        .forecast-day {
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all .18s ease;
            background: var(--card-bg);
            text-align: center;
            padding: .75rem .5rem;
            user-select: none;
            height: 100%;
        }

        .forecast-day:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(18,67,123,0.13);
            transform: translateY(-2px);
        }

        .forecast-day.selected {
            border-color: var(--navy);
            border-width: 2px;
            background: linear-gradient(160deg, #e8f0f9 0%, #f5f8fc 100%);
            box-shadow: 0 3px 10px rgba(18,67,123,0.18);
        }

        .forecast-day .day-name { font-weight: 700; font-size: .85rem; color: var(--navy); margin-bottom: .25rem; }
        .forecast-day .day-icon { font-size: 1.7rem; line-height: 1.4; margin-bottom: .4rem; }

        .metric-pill {
            display: block;
            font-size: .68rem;
            font-weight: 600;
            padding: .2em .5em;
            border-radius: 5px;
            margin-bottom: 3px;
        }


    </style>
</head>
<body>
    <header class="py-3">
        <div class="container d-flex align-items-center">
            <img src="/icons/logo_bg.png" alt="logo" width="40" height="40" class="me-2"
                 onerror="this.style.display='none'">
            <h1 class="text-white m-0">Derwentwater Weather</h1>
        </div>
    </header>

    <main class="container my-4">

        <!-- Current conditions card -->
        <div id="current-card" class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">
                    Lake Conditions
                    <span style="font-weight:400;text-transform:none;font-size:.72rem;color:var(--text-muted);margin-left:8px;"> 08:00–11:00</span>
                </h5>
                <div class="row g-3">
                    <!-- Left: all conditions in a compact column -->
                    <div class="col-md-4 d-flex flex-column gap-2">
                        <!-- Single row: icon · wind arrow · 3 badges -->
                        <div class="d-flex align-items-center gap-2 flex-wrap">
                            <div id="weather-icon-display" class="fs-2" style="flex-shrink:0;line-height:1;"></div>
                            <div class="text-center" style="flex-shrink:0;">
                                <div id="wind-dir-display" style="display:inline-block;transform:rotate(0deg);font-size:1.4rem;color:var(--navy);">↑</div>
                                <div id="wind-dir-label" style="font-size:.65rem;color:var(--text-muted);font-weight:600;line-height:1;">N</div>
                            </div>
                            <span id="badge-rain"  class="badge" style="font-size:.72rem;">Rain: –</span>
                            <span id="badge-wind"  class="badge" style="font-size:.72rem;">Wind: –</span>
                            <span id="badge-gusts" class="badge" style="font-size:.72rem;">Gusts: –</span>
                        </div>
                        <!-- Prediction alert -->
                        <div id="badge-prediction" class="alert mb-0 py-2 px-3 fw-bold" role="alert" style="font-size:.85rem;border-radius:8px;">–</div>
                    </div>
                    <!-- Right: meteogram -->
                    <div class="col-md-8">
                        <div id="meteogram-wrap">
                            <div id="daylightChart" style="width:100%;height:100%;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 4-day forecast strip -->
        <div id="forecast-strip" class="row row-cols-4 g-2">
            <!-- injected by JS -->
        </div>
    </main>

    <script>
    /* ================================================================
       Config & thresholds
    ================================================================ */
    const CONFIG = {
        url: "https://api.open-meteo.com/v1/forecast?latitude=54.594723&longitude=-3.14536&hourly=temperature_2m,wind_speed_10m,wind_gusts_10m,winddirection_10m,precipitation,weathercode&wind_speed_unit=mph&timezone=auto",
        thresholds: {
            wind:  { green: 10, amber: 18 },
            gusts: { green: 15, amber: 25 },
            rain:  { green: 1,  amber: 5  }
        },
        morningWindow: { startHour: 8, endHour: 11 }
    };

    /* ================================================================
       Helpers
    ================================================================ */
    const STATUS_BG   = { success:'#d1fae5', warning:'#fff3cd', danger:'#fee2e2' };
    const STATUS_TEXT = { success:'#065f46', warning:'#92400e', danger:'#991b1b' };

    function getStatusColor(value, {green, amber} = {}) {
        if (green !== undefined && value <= green) return 'success';
        if (amber !== undefined && value <= amber) return 'warning';
        return 'danger';
    }

    function degreeToCompass(num) {
        const arr = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
        return arr[Math.floor((num / 22.5) + 0.5) % 16];
    }

    function getWeatherIcon(code) {
        if (code === 0)               return '☀️';
        if (code >= 1 && code <= 3)   return '⛅';
        if (code >= 45 && code <= 48) return '🌫️';
        if (code >= 51 && code <= 57) return '🌦️';
        if (code >= 61 && code <= 67) return '🌧️';
        if (code >= 71 && code <= 77) return '❄️';
        if (code >= 80 && code <= 82) return '🌦️';
        if (code >= 85 && code <= 86) return '❄️';
        if (code >= 95 && code <= 99) return '⛈️';
        return '☁️';
    }

    function getPrediction(rainCol, windCol, gustCol) {
        if (rainCol === 'success' && windCol === 'success' && gustCol === 'success') return { label:'Great',    bg:'#d1fae5', text:'#065f46' };
        if (rainCol === 'success' && windCol === 'warning' && gustCol === 'warning') return { label:'Ok',       bg:'#fff3cd', text:'#92400e' };
        if (rainCol === 'success' && windCol === 'warning' && gustCol === 'danger')  return { label:'Marginal', bg:'#fed7aa', text:'#9a3412' };
        return { label:'Bad', bg:'#fee2e2', text:'#991b1b' };
    }

    function computeMorningStats(dayData, windowStart, windowEnd) {
        let windMax = 0, gustMax = 0, rainSum = 0;
        let dirSinSum = 0, dirCosSum = 0, dirCount = 0;
        let codes = [];
        dayData.time.forEach((t, i) => {
            const hour = new Date(t).getHours();
            if (hour >= windowStart && hour < windowEnd) {
                windMax  = Math.max(windMax,  dayData.wind[i]);
                gustMax  = Math.max(gustMax,  dayData.gusts[i]);
                rainSum += dayData.rain[i];
                // circular mean for wind direction
                const rad = dayData.dir[i] * Math.PI / 180;
                dirSinSum += Math.sin(rad);
                dirCosSum += Math.cos(rad);
                dirCount++;
                codes.push(dayData.code[i]);
            }
        });
        // dominant weather code in the morning window (most frequent)
        const morningCode = codes.length
            ? codes.sort((a,b) => codes.filter(v=>v===b).length - codes.filter(v=>v===a).length)[0]
            : dayData.code[0];
        // circular mean direction
        const morningDir = dirCount
            ? (Math.atan2(dirSinSum / dirCount, dirCosSum / dirCount) * 180 / Math.PI + 360) % 360
            : dayData.dir[0];
        return { windMax, gustMax, rainSum, morningCode, morningDir };
    }

    function computeDaylightStats(dayData) {
        const out = { time:[], wind:[], gusts:[], rain:[] };
        dayData.time.forEach((t, i) => {
            const hour = new Date(t).getHours();
            if (hour >= 6 && hour <= 18) {
                out.time.push(new Date(t).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }));
                out.wind.push(dayData.wind[i]);
                out.gusts.push(dayData.gusts[i]);
                out.rain.push(dayData.rain[i]);
            }
        });
        return out;
    }

    /* ================================================================
       Highcharts global theme
    ================================================================ */
    Highcharts.setOptions({
        chart: {
            style: { fontFamily:"'Segoe UI', system-ui, sans-serif" },
            backgroundColor: 'transparent',
            animation: { duration: 400 }
        },
        title:   { style: { display:'none' } },
        credits: { enabled: false },
        legend: {
            itemStyle: { color:'#1a2a3a', fontWeight:'600', fontSize:'11px' },
            borderWidth: 0,
            backgroundColor: 'transparent'
        },
        tooltip: {
            backgroundColor: '#12437b',
            borderColor: '#4a9fd4',
            borderRadius: 8,
            style: { color:'#fff', fontSize:'12px' },
            shared: true
        }
    });

    /* ================================================================
       Meteogram
    ================================================================ */
    let daylightChart = null;

    function buildMeteogram(daylightStats) {
        if (daylightChart && typeof daylightChart.destroy === 'function') {
            daylightChart.destroy();
        }

        /* Dynamic axis bounds */
        const maxGust = Math.max(...daylightStats.gusts, 0);
        const maxRain = Math.max(...daylightStats.rain,  0);

        // Wind axis: round up to nearest 10, at least 20, always include 20mph line
        const windMax  = Math.max(20, Math.ceil((maxGust * 1.15) / 10) * 10);
        // Rain axis: round up to nearest 2, at least 2
        const rainMax  = Math.max(2,  Math.ceil((maxRain  * 1.2)  / 2)  * 2);
        const rainTick = rainMax <= 6 ? 1 : rainMax <= 12 ? 2 : 5;

        daylightChart = Highcharts.chart('daylightChart', {
            chart: { zoomType:'x', marginTop:10, marginBottom:42, spacingLeft:0, spacingRight:6 },
            xAxis: [{
                categories: daylightStats.time,
                crosshair: { color:'rgba(74,159,212,0.35)', width:1, dashStyle:'ShortDash' },
                labels: {
                    style: { color:'#6c8aa8', fontSize:'10px' },
                    step: Math.max(1, Math.floor(daylightStats.time.length / 6))
                },
                lineColor: '#d0dce8',
                tickColor: '#d0dce8'
            }],
            yAxis: [
                {
                    title: { text:'mph', style:{ color:'#6c8aa8', fontSize:'10px' }, margin:4 },
                    labels: { format:'{value}', style:{ color:'#6c8aa8', fontSize:'10px' } },
                    min: 0, max: windMax, tickInterval: Math.ceil(windMax / 3 / 5) * 5,
                    gridLineColor: '#e4ecf2',
                    lineColor: '#d0dce8',
                    plotLines: [{
                        value: 20,
                        color: '#e53e3e',
                        dashStyle: 'Dot',
                        width: 2,
                        zIndex: 5,
                        label: {
                            text: '20 mph',
                            align: 'right',
                            x: -4,
                            style: { color:'#e53e3e', fontSize:'9px', fontWeight:'600' }
                        }
                    }]
                },
                {
                    title: { text:'mm', style:{ color:'#6c8aa8', fontSize:'10px' }, margin:4 },
                    labels: { format:'{value}', style:{ color:'#6c8aa8', fontSize:'10px' } },
                    opposite: true,
                    min: 0, max: rainMax, tickInterval: rainTick,
                    gridLineWidth: 0,
                    lineColor: '#d0dce8'
                }
            ],
            plotOptions: {
                column: { borderWidth:0, borderRadius:3, pointPadding:0.05, groupPadding:0 },
                spline:  { lineWidth:2.5, states:{ hover:{ lineWidth:3 } } }
            },
            series: [
                {
                    name: 'Rain', type:'column', yAxis:1,
                    data: daylightStats.rain,
                    color: 'rgba(100,181,246,0.55)',
                    borderColor: 'rgba(100,181,246,0.8)', borderWidth:1,
                    tooltip: { valueSuffix:' mm' }, zIndex:1
                },
                {
                    name: 'Wind', type:'areaspline',
                    data: daylightStats.wind,
                    color: '#81c784',
                    fillColor: {
                        linearGradient: { x1:0, y1:0, x2:0, y2:1 },
                        stops: [[0,'rgba(129,199,132,0.30)'],[1,'rgba(129,199,132,0.02)']]
                    },
                    marker: { enabled:false },
                    tooltip: { valueSuffix:' mph' }, zIndex:3
                },
                {
                    name: 'Gusts', type:'spline',
                    data: daylightStats.gusts,
                    color: '#ffb74d', dashStyle:'ShortDash', lineWidth:2,
                    marker: { enabled:false },
                    tooltip: { valueSuffix:' mph' }, zIndex:4
                }
            ],
            legend: { align:'left', verticalAlign:'top', floating:true, y:-4, x:2, symbolRadius:4, symbolHeight:10, symbolWidth:14 }
        });
    }

    /* ================================================================
       Main
    ================================================================ */
    async function init() {
        const thresholds  = CONFIG.thresholds;
        const windowStart = CONFIG.morningWindow.startHour;
        const windowEnd   = CONFIG.morningWindow.endHour;

        /* Live fetch */
        const resp = await fetch(CONFIG.url, { mode:'cors' });
        const data = await resp.json();
        const hourly = data.hourly;

        /* Group hourly rows by date */
        const byDate = {};
        hourly.time.forEach((t, i) => {
            const date = t.split('T')[0];
            if (!byDate[date]) byDate[date] = { time:[], wind:[], gusts:[], rain:[], dir:[], code:[] };
            byDate[date].time.push(t);
            byDate[date].wind.push(hourly.wind_speed_10m[i]);
            byDate[date].gusts.push(hourly.wind_gusts_10m[i]);
            byDate[date].rain.push(hourly.precipitation[i]);
            byDate[date].dir.push(hourly.winddirection_10m[i]);
            byDate[date].code.push(hourly.weathercode[i]);
        });

        const dates = Object.keys(byDate).slice(0, 4); // 4-day forecast

        /* Update current-conditions panel */
        function updateCurrent(date) {
            const d = byDate[date];
            if (!d) return;

            const stats = computeMorningStats(d, windowStart, windowEnd);

            document.getElementById('weather-icon-display').textContent = getWeatherIcon(stats.morningCode);
            document.getElementById('wind-dir-display').style.transform = `rotate(${stats.morningDir}deg)`;
            document.getElementById('wind-dir-label').textContent        = degreeToCompass(stats.morningDir);

            const setBadge = (id, label, val, thresh) => {
                const c  = getStatusColor(val, thresh);
                const el = document.getElementById(id);
                el.textContent      = label;
                el.style.background = STATUS_BG[c];
                el.style.color      = STATUS_TEXT[c];
                el.className        = 'badge';
            };
            setBadge('badge-rain',  `🌧 ${stats.rainSum.toFixed(1)} mm`,  stats.rainSum,  thresholds.rain);
            setBadge('badge-wind',  `💨 ${stats.windMax.toFixed(0)} mph`, stats.windMax,  thresholds.wind);
            setBadge('badge-gusts', `🌪️ ${stats.gustMax.toFixed(0)} mph`, stats.gustMax,  thresholds.gusts);

            // Prediction badge
            const rainCol = getStatusColor(stats.rainSum,  thresholds.rain);
            const windCol = getStatusColor(stats.windMax,  thresholds.wind);
            const gustCol = getStatusColor(stats.gustMax,  thresholds.gusts);
            const pred    = getPrediction(rainCol, windCol, gustCol);
            const PRED_ICONS = { Great:'🌟', Ok:'👍', Marginal:'⚠️', Bad:'❌' };
            const predEl  = document.getElementById('badge-prediction');
            predEl.textContent      = `${PRED_ICONS[pred.label] || ''} ${pred.label} conditions`;
            predEl.style.background = pred.bg;
            predEl.style.color      = pred.text;
            predEl.style.border     = `1px solid ${pred.text}33`;

            buildMeteogram(computeDaylightStats(d));
        }

        /* Build 4-day forecast cards */
        const container = document.getElementById('forecast-strip');
        container.innerHTML = '';

        dates.forEach(date => {
            const d     = byDate[date];
            const stats = computeMorningStats(d, windowStart, windowEnd);
            const dow   = new Date(date).toLocaleDateString([], { weekday:'short' });
            const dom   = new Date(date).getDate();
            const mon   = new Date(date).toLocaleDateString([], { month:'short' });
            const icon  = getWeatherIcon(d.code[Math.floor(d.code.length / 2)] ?? d.code[0]);

            const rainCol  = getStatusColor(stats.rainSum,  thresholds.rain);
            const windCol  = getStatusColor(stats.windMax,  thresholds.wind);
            const gustCol  = getStatusColor(stats.gustMax,  thresholds.gusts);

            const col = document.createElement('div');
            col.className = 'col';
            col.innerHTML = `
              <div class="forecast-day" data-date="${date}">
                <div class="day-name">${dow} ${dom} ${mon}</div>
                <div class="day-icon">${icon}</div>
                <span class="metric-pill" style="background:${STATUS_BG[rainCol]};color:${STATUS_TEXT[rainCol]};">
                  🌧 ${stats.rainSum.toFixed(1)} mm
                </span>
                <span class="metric-pill" style="background:${STATUS_BG[windCol]};color:${STATUS_TEXT[windCol]};">
                  💨 ${stats.windMax.toFixed(0)} mph
                </span>
                <span class="metric-pill" style="background:${STATUS_BG[gustCol]};color:${STATUS_TEXT[gustCol]};">
                  🌪️ ${stats.gustMax.toFixed(0)} mph
                </span>
              </div>`;

            col.querySelector('.forecast-day').addEventListener('click', () => {
                document.querySelectorAll('.forecast-day').forEach(c => c.classList.remove('selected'));
                col.querySelector('.forecast-day').classList.add('selected');
                updateCurrent(date);
            });
            container.appendChild(col);
        });

        /* Select first day by default */
        if (dates.length) {
            container.querySelector('.forecast-day').classList.add('selected');
            updateCurrent(dates[0]);
        }
    }

    init();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
