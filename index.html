<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derwentwater Weather</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12437b" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/highcharts@11.1.0/highcharts.js"></script>

    <style>
        :root {
            --navy:      #12437b;
            --navy-dark: #12437bff;
            --navy-mid:  #1a5298;
            --accent:    #4a9fd4;
            --card-bg:   #ffffff;
            --border:    #d0dce8;
            --text-muted:#6c8aa8;
        }

        body {
            background: #aacbd2ff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #1a2a3a;
        }

        header {
            background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 60%, var(--navy-mid) 100%);
            border-bottom: 3px solid var(--accent);
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
        }

        header h1 {
            font-size: 1.4rem;
            letter-spacing: 0.03em;
            font-weight: 600;
        }

        /* ── Session toggle pills ── */
        .session-toggle {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .session-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.30);
            color: #fff;
            border-radius: 20px;
            padding: 3px 12px;
            font-size: .72rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s ease;
            white-space: nowrap;
        }

        .session-btn:hover { background: rgba(255,255,255,0.22); }

        .session-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 1px 6px rgba(74,159,212,0.5);
        }

        /* ── Settings gear ── */
        .settings-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.30);
            color: #fff;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .15s ease;
            flex-shrink: 0;
        }
        .settings-btn:hover { background: rgba(255,255,255,0.22); }

        /* ── Settings drawer ── */
        #settings-drawer {
            display: none;
            background: var(--card-bg);
            border-bottom: 3px solid var(--accent);
            box-shadow: 0 4px 16px rgba(18,67,123,0.15);
            padding: 1rem 0;
        }

        #settings-drawer.open { display: block; }

        .settings-section-title {
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--text-muted);
            margin-bottom: .5rem;
        }

        .settings-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .75rem;
            background: #f8fafc;
        }

        .threshold-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: .55rem;
        }

        .threshold-row:last-child { margin-bottom: 0; }

        .threshold-label {
            width: 60px;
            font-size: .75rem;
            font-weight: 600;
            color: var(--navy);
            flex-shrink: 0;
        }

        .threshold-input-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .threshold-input-wrap input[type="number"] {
            width: 58px;
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 3px 6px;
            font-size: .8rem;
            font-weight: 600;
            color: var(--navy);
            text-align: center;
        }

        .threshold-input-wrap input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(74,159,212,0.2);
        }

        .thresh-chip {
            font-size: .65rem;
            padding: 2px 7px;
            border-radius: 4px;
            font-weight: 600;
        }

        .time-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: .55rem;
        }

        .time-row:last-child { margin-bottom: 0; }

        .time-label {
            font-size: .72rem;
            font-weight: 600;
            color: var(--navy);
            width: 68px;
            flex-shrink: 0;
        }

        .time-row input[type="number"] {
            width: 50px;
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 3px 6px;
            font-size: .8rem;
            font-weight: 600;
            color: var(--navy);
            text-align: center;
        }

        .time-row input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(74,159,212,0.2);
        }

        .time-sep { font-size: .75rem; color: var(--text-muted); font-weight: 600; }

        .settings-save-btn {
            background: var(--navy);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 7px 22px;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s ease;
        }

        .settings-save-btn:hover { background: var(--navy-mid); }

        .settings-reset-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 14px;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s ease;
        }

        .settings-reset-btn:hover { border-color: var(--navy); color: var(--navy); }

        /* ── Main card ── */
        #current-card {
            border: 1px solid var(--border);
            border-top: 4px solid var(--navy);
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(18,67,123,0.10);
            background: var(--card-bg);
        }

        #current-card .card-title {
            color: var(--navy);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 2px solid var(--border);
            padding-bottom: .5rem;
            margin-bottom: 1rem;
        }

        #wind-dir-display { line-height: 1; color: var(--navy); font-size: 2rem !important; }
        #wind-dir-label   { color: var(--text-muted); font-size: .75rem; font-weight: 600; }

        .badge { font-size: .8rem; padding: .35em .7em; border-radius: 6px; font-weight: 600; }

        #meteogram-wrap {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 0.5rem 0.25rem 0.25rem;
            height: 280px;
        }

        .forecast-day {
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all .18s ease;
            background: var(--card-bg);
            text-align: center;
            padding: .75rem .5rem;
            user-select: none;
            height: 100%;
        }

        .forecast-day:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(18,67,123,0.13);
            transform: translateY(-2px);
        }

        .forecast-day.selected {
            border-color: var(--navy);
            border-width: 2px;
            background: linear-gradient(160deg, #e8f0f9 0%, #f5f8fc 100%);
            box-shadow: 0 3px 10px rgba(18,67,123,0.18);
        }

        .forecast-day .day-name { font-weight: 700; font-size: .85rem; color: var(--navy); margin-bottom: .25rem; }
        .forecast-day .day-icon { font-size: 1.7rem; line-height: 1.4; margin-bottom: .4rem; }

        .metric-pill {
            display: block;
            font-size: .68rem;
            font-weight: 600;
            padding: .2em .5em;
            border-radius: 5px;
            margin-bottom: 3px;
        }

        .save-toast {
            position: fixed;
            bottom: 1.2rem;
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            background: var(--navy);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: .8rem;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
            opacity: 0;
            transition: opacity .25s ease, transform .25s ease;
            pointer-events: none;
            z-index: 9999;
        }

        .save-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <header class="py-2">
        <div class="container">
            <!-- Row 1: logo + title + settings -->
            <div class="d-flex align-items-center mb-2">
                <img src="/icons/logo_bg.png" alt="logo" width="40" height="40" class="me-2"
                     onerror="this.style.display='none'">
                <h1 class="text-white m-0 me-auto">Derwentwater Weather</h1>
                <button class="settings-btn ms-2" id="settings-toggle" title="Settings" aria-label="Settings">
                    <i class="bi bi-sliders" style="font-size:.95rem;"></i>
                </button>
            </div>
            <!-- Row 2: session pills -->
            <div class="session-toggle" id="session-toggle">
                <button class="session-btn" data-session="adults">🚣 Adults 08–10</button>
                <button class="session-btn" data-session="juniors">🧒 Juniors 10–12</button>
                <button class="session-btn" data-session="evening">🌅 Evening 18–20</button>
            </div>
        </div>
    </header>

    <!-- Settings Drawer -->
    <div id="settings-drawer">
        <div class="container">
            <div class="row g-3">
                <!-- Thresholds -->
                <div class="col-md-6">
                    <div class="settings-section-title">Condition Thresholds</div>
                    <div class="settings-card">
                        <!-- Wind -->
                        <div class="threshold-row">
                            <span class="threshold-label">💨 Wind</span>
                            <div class="threshold-input-wrap">
                                <span class="thresh-chip" style="background:#d1fae5;color:#065f46;">Green ≤</span>
                                <input type="number" id="s-wind-green" min="1" max="50" step="1">
                                <span class="thresh-chip" style="background:#fff3cd;color:#92400e;">Amber ≤</span>
                                <input type="number" id="s-wind-amber" min="1" max="50" step="1">
                                <span style="font-size:.7rem;color:var(--text-muted);">mph</span>
                            </div>
                        </div>
                        <!-- Gusts -->
                        <div class="threshold-row">
                            <span class="threshold-label">🌪️ Gusts</span>
                            <div class="threshold-input-wrap">
                                <span class="thresh-chip" style="background:#d1fae5;color:#065f46;">Green ≤</span>
                                <input type="number" id="s-gusts-green" min="1" max="60" step="1">
                                <span class="thresh-chip" style="background:#fff3cd;color:#92400e;">Amber ≤</span>
                                <input type="number" id="s-gusts-amber" min="1" max="60" step="1">
                                <span style="font-size:.7rem;color:var(--text-muted);">mph</span>
                            </div>
                        </div>
                        <!-- Rain -->
                        <div class="threshold-row">
                            <span class="threshold-label">🌧 Rain</span>
                            <div class="threshold-input-wrap">
                                <span class="thresh-chip" style="background:#d1fae5;color:#065f46;">Green ≤</span>
                                <input type="number" id="s-rain-green" min="0" max="20" step="0.5">
                                <span class="thresh-chip" style="background:#fff3cd;color:#92400e;">Amber ≤</span>
                                <input type="number" id="s-rain-amber" min="0" max="20" step="0.5">
                                <span style="font-size:.7rem;color:var(--text-muted);">mm</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Session windows -->
                <div class="col-md-6">
                    <div class="settings-section-title">Session Time Windows</div>
                    <div class="settings-card">
                        <div class="time-row">
                            <span class="time-label">🚣 Adults</span>
                            <input type="number" id="s-adults-start" min="0" max="23" step="1">
                            <span class="time-sep">:00 – </span>
                            <input type="number" id="s-adults-end" min="1" max="24" step="1">
                            <span class="time-sep">:00</span>
                        </div>
                        <div class="time-row">
                            <span class="time-label">🧒 Juniors</span>
                            <input type="number" id="s-juniors-start" min="0" max="23" step="1">
                            <span class="time-sep">:00 – </span>
                            <input type="number" id="s-juniors-end" min="1" max="24" step="1">
                            <span class="time-sep">:00</span>
                        </div>
                        <div class="time-row">
                            <span class="time-label">🌅 Evening</span>
                            <input type="number" id="s-evening-start" min="0" max="23" step="1">
                            <span class="time-sep">:00 – </span>
                            <input type="number" id="s-evening-end" min="1" max="24" step="1">
                            <span class="time-sep">:00</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Save / Reset -->
            <div class="d-flex gap-2 mt-3">
                <button class="settings-save-btn" id="settings-save">
                    <i class="bi bi-check-lg me-1"></i>Save Settings
                </button>
                <button class="settings-reset-btn" id="settings-reset">
                    Reset to defaults
                </button>
            </div>
        </div>
    </div>

    <main class="container my-4">

        <!-- Current conditions card -->
        <div id="current-card" class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">
                    Lake Conditions
                    <span id="window-label" style="font-weight:400;text-transform:none;font-size:.72rem;color:var(--text-muted);margin-left:8px;"></span>
                </h5>
                <div class="row g-3">
                    <!-- Left: all conditions in a compact column -->
                    <div class="col-md-4 d-flex flex-column gap-2">
                        <!-- Single row: icon · wind arrow · 3 badges -->
                        <div class="d-flex align-items-center gap-2 flex-wrap">
                            <div id="weather-icon-display" class="fs-2" style="flex-shrink:0;line-height:1;"></div>
                            <div class="text-center" style="flex-shrink:0;">
                                <div id="wind-dir-display" style="display:inline-block;transform:rotate(180deg);font-size:1.4rem;color:var(--navy);">↑</div>
                                <div id="wind-dir-label" style="font-size:.65rem;color:var(--text-muted);font-weight:600;line-height:1;">N</div>
                            </div>
                            <span id="badge-rain"  class="badge" style="font-size:.72rem;">Rain: –</span>
                            <span id="badge-wind"  class="badge" style="font-size:.72rem;">Wind: –</span>
                            <span id="badge-gusts" class="badge" style="font-size:.72rem;">Gusts: –</span>
                        </div>
                        <!-- Prediction alert -->
                        <div id="badge-prediction" class="alert mb-0 py-2 px-3 fw-bold" role="alert" style="font-size:.85rem;border-radius:8px;">–</div>
                    </div>
                    <!-- Right: meteogram -->
                    <div class="col-md-8">
                        <div id="meteogram-wrap">
                            <div id="daylightChart" style="width:100%;height:100%;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 4-day forecast strip -->
        <div id="forecast-strip" class="row row-cols-4 g-2">
            <!-- injected by JS -->
        </div>
    </main>

    <!-- Toast feedback -->
    <div class="save-toast" id="save-toast">✓ Settings saved</div>

    <script>
    /* ================================================================
       Defaults
    ================================================================ */
    const DEFAULTS = {
        thresholds: {
            wind:  { green: 10, amber: 18 },
            gusts: { green: 15, amber: 25 },
            rain:  { green: 1,  amber: 5  }
        },
        sessions: {
            adults:  { startHour: 8,  endHour: 10 },
            juniors: { startHour: 10, endHour: 12 },
            evening: { startHour: 18, endHour: 20 }
        }
    };

    /* ================================================================
       LocalStorage helpers
    ================================================================ */
    const STORAGE_KEY = 'derwentwater_settings_v1';

    function loadSettings() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                // Deep merge with defaults to handle missing keys after updates
                return {
                    thresholds: {
                        wind:  { ...DEFAULTS.thresholds.wind,  ...(parsed.thresholds?.wind  || {}) },
                        gusts: { ...DEFAULTS.thresholds.gusts, ...(parsed.thresholds?.gusts || {}) },
                        rain:  { ...DEFAULTS.thresholds.rain,  ...(parsed.thresholds?.rain  || {}) }
                    },
                    sessions: {
                        adults:  { ...DEFAULTS.sessions.adults,  ...(parsed.sessions?.adults  || {}) },
                        juniors: { ...DEFAULTS.sessions.juniors, ...(parsed.sessions?.juniors || {}) },
                        evening: { ...DEFAULTS.sessions.evening, ...(parsed.sessions?.evening || {}) }
                    }
                };
            }
        } catch(e) {}
        return JSON.parse(JSON.stringify(DEFAULTS));
    }

    function saveSettings(s) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
    }

    /* ================================================================
       App state
    ================================================================ */
    let settings      = loadSettings();
    let activeSession = 'adults';   // default session on load
    let cachedByDate  = {};         // weather data cache
    let selectedDate  = null;

    /* Convenience: get current session window */
    function currentWindow() { return settings.sessions[activeSession]; }

    /* ================================================================
       Helpers
    ================================================================ */
    const STATUS_BG   = { success:'#d1fae5', warning:'#fff3cd', danger:'#fee2e2' };
    const STATUS_TEXT = { success:'#065f46', warning:'#92400e', danger:'#991b1b' };

    function getStatusColor(value, {green, amber} = {}) {
        if (green !== undefined && value <= green) return 'success';
        if (amber !== undefined && value <= amber) return 'warning';
        return 'danger';
    }

    function degreeToCompass(num) {
        const arr = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
        return arr[Math.floor((num / 22.5) + 0.5) % 16];
    }

    function getWeatherIcon(code) {
        if (code === 0)               return '☀️';
        if (code >= 1 && code <= 3)   return '⛅';
        if (code >= 45 && code <= 48) return '🌫️';
        if (code >= 51 && code <= 57) return '🌦️';
        if (code >= 61 && code <= 67) return '🌧️';
        if (code >= 71 && code <= 77) return '❄️';
        if (code >= 80 && code <= 82) return '🌦️';
        if (code >= 85 && code <= 86) return '❄️';
        if (code >= 95 && code <= 99) return '⛈️';
        return '☁️';
    }

    function getPrediction(rainCol, windCol, gustCol) {
        if (rainCol === 'success' && windCol === 'success' && gustCol === 'success') return { label:'Great',    bg:'#d1fae5', text:'#065f46' };
        if (rainCol === 'success' && windCol === 'warning' && gustCol === 'warning') return { label:'Ok',       bg:'#fff3cd', text:'#92400e' };
        if (rainCol === 'success' && windCol === 'warning' && gustCol === 'danger')  return { label:'Marginal', bg:'#fed7aa', text:'#9a3412' };
        return { label:'Bad', bg:'#fee2e2', text:'#991b1b' };
    }

    function computeWindowStats(dayData, windowStart, windowEnd) {
        let windMax = 0, gustMax = 0, rainSum = 0;
        let dirSinSum = 0, dirCosSum = 0, dirCount = 0;
        let codes = [];
        dayData.time.forEach((t, i) => {
            const hour = new Date(t).getHours();
            if (hour >= windowStart && hour < windowEnd) {
                windMax  = Math.max(windMax,  dayData.wind[i]);
                gustMax  = Math.max(gustMax,  dayData.gusts[i]);
                rainSum += dayData.rain[i];
                const rad = dayData.dir[i] * Math.PI / 180;
                dirSinSum += Math.sin(rad);
                dirCosSum += Math.cos(rad);
                dirCount++;
                codes.push(dayData.code[i]);
            }
        });
        const morningCode = codes.length
            ? codes.sort((a,b) => codes.filter(v=>v===b).length - codes.filter(v=>v===a).length)[0]
            : dayData.code[0];
        const morningDir = dirCount
            ? (Math.atan2(dirSinSum / dirCount, dirCosSum / dirCount) * 180 / Math.PI + 360) % 360
            : dayData.dir[0];
        return { windMax, gustMax, rainSum, morningCode, morningDir };
    }

    function computeDaylightStats(dayData) {
        const out = { time:[], wind:[], gusts:[], rain:[] };
        dayData.time.forEach((t, i) => {
            const hour = new Date(t).getHours();
            if (hour >= 6 && hour <= 20) {
                out.time.push(new Date(t).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }));
                out.wind.push(dayData.wind[i]);
                out.gusts.push(dayData.gusts[i]);
                out.rain.push(dayData.rain[i]);
            }
        });
        return out;
    }

    /* ================================================================
       Highcharts global theme
    ================================================================ */
    Highcharts.setOptions({
        chart: {
            style: { fontFamily:"'Segoe UI', system-ui, sans-serif" },
            backgroundColor: 'transparent',
            animation: { duration: 400 }
        },
        title:   { style: { display:'none' } },
        credits: { enabled: false },
        legend: {
            itemStyle: { color:'#1a2a3a', fontWeight:'600', fontSize:'11px' },
            borderWidth: 0,
            backgroundColor: 'transparent'
        },
        tooltip: {
            backgroundColor: '#12437b',
            borderColor: '#4a9fd4',
            borderRadius: 8,
            style: { color:'#fff', fontSize:'12px' },
            shared: true
        }
    });

    /* ================================================================
       Meteogram
    ================================================================ */
    let daylightChart = null;

    function buildMeteogram(daylightStats) {
        if (daylightChart && typeof daylightChart.destroy === 'function') {
            daylightChart.destroy();
        }

        const maxGust = Math.max(...daylightStats.gusts, 0);
        const maxRain = Math.max(...daylightStats.rain,  0);
        const windMax  = Math.max(20, Math.ceil((maxGust * 1.15) / 10) * 10);
        const rainMax  = Math.max(2,  Math.ceil((maxRain  * 1.2)  / 2)  * 2);
        const rainTick = rainMax <= 6 ? 1 : rainMax <= 12 ? 2 : 5;

        // Reference line: amber wind threshold
        const refLine = settings.thresholds.wind.amber;

        daylightChart = Highcharts.chart('daylightChart', {
            chart: { zoomType:'x', marginTop:10, marginBottom:42, spacingLeft:0, spacingRight:6 },
            xAxis: [{
                categories: daylightStats.time,
                crosshair: { color:'rgba(74,159,212,0.35)', width:1, dashStyle:'ShortDash' },
                labels: {
                    style: { color:'#6c8aa8', fontSize:'10px' },
                    step: Math.max(1, Math.floor(daylightStats.time.length / 6))
                },
                lineColor: '#d0dce8',
                tickColor: '#d0dce8'
            }],
            yAxis: [
                {
                    title: { text:'mph', style:{ color:'#6c8aa8', fontSize:'10px' }, margin:4 },
                    labels: { format:'{value}', style:{ color:'#6c8aa8', fontSize:'10px' } },
                    min: 0, max: windMax, tickInterval: Math.ceil(windMax / 3 / 5) * 5,
                    gridLineColor: '#e4ecf2',
                    lineColor: '#d0dce8',
                    plotLines: [{
                        value: refLine,
                        color: '#e53e3e',
                        dashStyle: 'Dot',
                        width: 2,
                        zIndex: 5,
                        label: {
                            text: `${refLine} mph`,
                            align: 'right',
                            x: -4,
                            style: { color:'#e53e3e', fontSize:'9px', fontWeight:'600' }
                        }
                    }]
                },
                {
                    title: { text:'mm', style:{ color:'#6c8aa8', fontSize:'10px' }, margin:4 },
                    labels: { format:'{value}', style:{ color:'#6c8aa8', fontSize:'10px' } },
                    opposite: true,
                    min: 0, max: rainMax, tickInterval: rainTick,
                    gridLineWidth: 0,
                    lineColor: '#d0dce8'
                }
            ],
            plotOptions: {
                column: { borderWidth:0, borderRadius:3, pointPadding:0.05, groupPadding:0 },
                spline:  { lineWidth:2.5, states:{ hover:{ lineWidth:3 } } }
            },
            series: [
                {
                    name: 'Rain', type:'column', yAxis:1,
                    data: daylightStats.rain,
                    color: 'rgba(100,181,246,0.55)',
                    borderColor: 'rgba(100,181,246,0.8)', borderWidth:1,
                    tooltip: { valueSuffix:' mm' }, zIndex:1
                },
                {
                    name: 'Wind', type:'areaspline',
                    data: daylightStats.wind,
                    color: '#81c784',
                    fillColor: {
                        linearGradient: { x1:0, y1:0, x2:0, y2:1 },
                        stops: [[0,'rgba(129,199,132,0.30)'],[1,'rgba(129,199,132,0.02)']]
                    },
                    marker: { enabled:false },
                    tooltip: { valueSuffix:' mph' }, zIndex:3
                },
                {
                    name: 'Gusts', type:'spline',
                    data: daylightStats.gusts,
                    color: '#ffb74d', dashStyle:'ShortDash', lineWidth:2,
                    marker: { enabled:false },
                    tooltip: { valueSuffix:' mph' }, zIndex:4
                }
            ],
            legend: { align:'left', verticalAlign:'top', floating:true, y:-4, x:2, symbolRadius:4, symbolHeight:10, symbolWidth:14 }
        });
    }

    /* ================================================================
       UI updaters
    ================================================================ */
    function updateWindowLabel() {
        const w = currentWindow();
        const NAMES = { adults:'Adults', juniors:'Juniors', evening:'Evening' };
        document.getElementById('window-label').textContent =
            `${NAMES[activeSession]} – ${String(w.startHour).padStart(2,'0')}:00–${String(w.endHour).padStart(2,'0')}:00`;
    }

    function updateSessionButtons() {
        document.querySelectorAll('.session-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.session === activeSession);
        });
    }

    function updateCurrent(date) {
        const d = cachedByDate[date];
        if (!d) return;
        const w = currentWindow();
        const thresholds = settings.thresholds;

        const stats = computeWindowStats(d, w.startHour, w.endHour);

        document.getElementById('weather-icon-display').textContent = getWeatherIcon(stats.morningCode);
        document.getElementById('wind-dir-display').style.transform = `rotate(${stats.morningDir}deg)`;
        document.getElementById('wind-dir-label').textContent        = degreeToCompass(stats.morningDir);

        const setBadge = (id, label, val, thresh) => {
            const c  = getStatusColor(val, thresh);
            const el = document.getElementById(id);
            el.textContent      = label;
            el.style.background = STATUS_BG[c];
            el.style.color      = STATUS_TEXT[c];
            el.className        = 'badge';
        };
        setBadge('badge-rain',  `🌧 ${stats.rainSum.toFixed(1)} mm`,  stats.rainSum,  thresholds.rain);
        setBadge('badge-wind',  `💨 ${stats.windMax.toFixed(0)} mph`, stats.windMax,  thresholds.wind);
        setBadge('badge-gusts', `🌪️ ${stats.gustMax.toFixed(0)} mph`, stats.gustMax,  thresholds.gusts);

        const rainCol = getStatusColor(stats.rainSum,  thresholds.rain);
        const windCol = getStatusColor(stats.windMax,  thresholds.wind);
        const gustCol = getStatusColor(stats.gustMax,  thresholds.gusts);
        const pred    = getPrediction(rainCol, windCol, gustCol);
        const PRED_ICONS = { Great:'🌟', Ok:'👍', Marginal:'⚠️', Bad:'❌' };
        const predEl  = document.getElementById('badge-prediction');
        predEl.textContent      = `${PRED_ICONS[pred.label] || ''} ${pred.label} conditions`;
        predEl.style.background = pred.bg;
        predEl.style.color      = pred.text;
        predEl.style.border     = `1px solid ${pred.text}33`;

        buildMeteogram(computeDaylightStats(d));
        updateWindowLabel();
    }

    function rebuildForecastStrip(dates) {
        const thresholds = settings.thresholds;
        const w = currentWindow();
        const container = document.getElementById('forecast-strip');
        container.innerHTML = '';

        dates.forEach(date => {
            const d     = cachedByDate[date];
            const stats = computeWindowStats(d, w.startHour, w.endHour);
            const dow   = new Date(date).toLocaleDateString([], { weekday:'short' });
            const dom   = new Date(date).getDate();
            const mon   = new Date(date).toLocaleDateString([], { month:'short' });
            const icon  = getWeatherIcon(d.code[Math.floor(d.code.length / 2)] ?? d.code[0]);

            const rainCol  = getStatusColor(stats.rainSum,  thresholds.rain);
            const windCol  = getStatusColor(stats.windMax,  thresholds.wind);
            const gustCol  = getStatusColor(stats.gustMax,  thresholds.gusts);

            const col = document.createElement('div');
            col.className = 'col';
            col.innerHTML = `
              <div class="forecast-day${date === selectedDate ? ' selected' : ''}" data-date="${date}">
                <div class="day-name">${dow} ${dom} ${mon}</div>
                <div class="day-icon">${icon}</div>
                <span class="metric-pill" style="background:${STATUS_BG[rainCol]};color:${STATUS_TEXT[rainCol]};">
                  🌧 ${stats.rainSum.toFixed(1)} mm
                </span>
                <span class="metric-pill" style="background:${STATUS_BG[windCol]};color:${STATUS_TEXT[windCol]};">
                  💨 ${stats.windMax.toFixed(0)} mph
                </span>
                <span class="metric-pill" style="background:${STATUS_BG[gustCol]};color:${STATUS_TEXT[gustCol]};">
                  🌪️ ${stats.gustMax.toFixed(0)} mph
                </span>
              </div>`;

            col.querySelector('.forecast-day').addEventListener('click', () => {
                selectedDate = date;
                document.querySelectorAll('.forecast-day').forEach(c => c.classList.remove('selected'));
                col.querySelector('.forecast-day').classList.add('selected');
                updateCurrent(date);
            });
            container.appendChild(col);
        });
    }

    /* ================================================================
       Settings panel
    ================================================================ */
    function populateSettingsForm() {
        const t = settings.thresholds;
        const s = settings.sessions;
        document.getElementById('s-wind-green').value   = t.wind.green;
        document.getElementById('s-wind-amber').value   = t.wind.amber;
        document.getElementById('s-gusts-green').value  = t.gusts.green;
        document.getElementById('s-gusts-amber').value  = t.gusts.amber;
        document.getElementById('s-rain-green').value   = t.rain.green;
        document.getElementById('s-rain-amber').value   = t.rain.amber;
        document.getElementById('s-adults-start').value  = s.adults.startHour;
        document.getElementById('s-adults-end').value    = s.adults.endHour;
        document.getElementById('s-juniors-start').value = s.juniors.startHour;
        document.getElementById('s-juniors-end').value   = s.juniors.endHour;
        document.getElementById('s-evening-start').value = s.evening.startHour;
        document.getElementById('s-evening-end').value   = s.evening.endHour;
    }

    function readSettingsForm() {
        const n = id => parseFloat(document.getElementById(id).value);
        return {
            thresholds: {
                wind:  { green: n('s-wind-green'),  amber: n('s-wind-amber')  },
                gusts: { green: n('s-gusts-green'), amber: n('s-gusts-amber') },
                rain:  { green: n('s-rain-green'),  amber: n('s-rain-amber')  }
            },
            sessions: {
                adults:  { startHour: n('s-adults-start'),  endHour: n('s-adults-end')  },
                juniors: { startHour: n('s-juniors-start'), endHour: n('s-juniors-end') },
                evening: { startHour: n('s-evening-start'), endHour: n('s-evening-end') }
            }
        };
    }

    function showToast(msg) {
        const el = document.getElementById('save-toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
    }

    /* ================================================================
       Settings event wiring
    ================================================================ */
    document.getElementById('settings-toggle').addEventListener('click', () => {
        const drawer = document.getElementById('settings-drawer');
        const isOpen = drawer.classList.toggle('open');
        if (isOpen) populateSettingsForm();
    });

    document.getElementById('settings-save').addEventListener('click', () => {
        const newSettings = readSettingsForm();
        // Basic validation: green < amber
        const t = newSettings.thresholds;
        if (t.wind.green >= t.wind.amber || t.gusts.green >= t.gusts.amber || t.rain.green >= t.rain.amber) {
            alert('Green threshold must be less than Amber threshold.');
            return;
        }
        settings = newSettings;
        saveSettings(settings);
        document.getElementById('settings-drawer').classList.remove('open');
        // Re-render with new settings
        const dates = Object.keys(cachedByDate).slice(0, 4);
        rebuildForecastStrip(dates);
        if (selectedDate) updateCurrent(selectedDate);
        showToast('✓ Settings saved');
    });

    document.getElementById('settings-reset').addEventListener('click', () => {
        settings = JSON.parse(JSON.stringify(DEFAULTS));
        saveSettings(settings);
        populateSettingsForm();
        const dates = Object.keys(cachedByDate).slice(0, 4);
        rebuildForecastStrip(dates);
        if (selectedDate) updateCurrent(selectedDate);
        showToast('↺ Reset to defaults');
    });

    /* ================================================================
       Session toggle wiring
    ================================================================ */
    document.getElementById('session-toggle').addEventListener('click', e => {
        const btn = e.target.closest('.session-btn');
        if (!btn) return;
        activeSession = btn.dataset.session;
        updateSessionButtons();
        const dates = Object.keys(cachedByDate).slice(0, 4);
        rebuildForecastStrip(dates);
        if (selectedDate) updateCurrent(selectedDate);
    });

    /* ================================================================
       Main
    ================================================================ */
    const API_URL = "https://api.open-meteo.com/v1/forecast?latitude=54.594723&longitude=-3.14536&hourly=temperature_2m,wind_speed_10m,wind_gusts_10m,winddirection_10m,precipitation,weathercode&wind_speed_unit=mph&timezone=auto";

    async function init() {
        const resp   = await fetch(API_URL, { mode:'cors' });
        const data   = await resp.json();
        const hourly = data.hourly;

        /* Group by date */
        hourly.time.forEach((t, i) => {
            const date = t.split('T')[0];
            if (!cachedByDate[date]) cachedByDate[date] = { time:[], wind:[], gusts:[], rain:[], dir:[], code:[] };
            cachedByDate[date].time.push(t);
            cachedByDate[date].wind.push(hourly.wind_speed_10m[i]);
            cachedByDate[date].gusts.push(hourly.wind_gusts_10m[i]);
            cachedByDate[date].rain.push(hourly.precipitation[i]);
            cachedByDate[date].dir.push(hourly.winddirection_10m[i]);
            cachedByDate[date].code.push(hourly.weathercode[i]);
        });

        const dates = Object.keys(cachedByDate).slice(0, 4);
        selectedDate = dates[0];

        updateSessionButtons();
        rebuildForecastStrip(dates);

        /* Select first day */
        if (selectedDate) {
            const first = document.querySelector('.forecast-day[data-date="' + selectedDate + '"]');
            if (first) first.classList.add('selected');
            updateCurrent(selectedDate);
        }
    }

    init();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
